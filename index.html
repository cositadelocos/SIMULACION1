<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Scripts de A-Frame y MindAR -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    
    <title>Museo AR - Búsqueda de Pistas</title>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui-container {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        z-index: 10;
        display: none;
      }
      .btn {
        padding: 10px 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        border: 2px solid white;
        border-radius: 10px;
        font-family: sans-serif;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <!-- ui-container para mostrar mensajes o botones -->
    <div id="ui-container">
      <button class="btn" id="info-btn">Identificado: Guía Activo</button>
    </div>

    <!-- Escena AR interactiva -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
             
      <a-assets>
        <!-- Tu modelo 3D -->
        <a-asset-item id="piezaModel" src="./modelo.glb"></a-asset-item>
        
        <!-- Audio pregrabado del guía -->
        <audio id="guiaAudio" src="./traje.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Target de Imagen 0 (El primer target del archivo .mind) -->
      <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
        <!-- El Modelo 3D se ubica aquí -->
        <a-gltf-model rotation="0 0 0 " position="0 0 0" scale="0.5 0.5 0.5" src="#piezaModel" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const targetEntity = document.querySelector('#target-entity');
      const uiContainer = document.querySelector('#ui-container');
      let yaHablo = false;

      // Detectar cuando la cámara encuentra la imagen
      targetEntity.addEventListener("targetFound", event => {
        console.log("¡Imagen encontrada!");
        uiContainer.style.display = 'block';

        // Evitar que hable múltiples veces si la cámara parpadea
        if (!yaHablo) {
          const guiaAudio = document.querySelector('#guiaAudio');
          // Iniciar el audio cuando se detecta el objetivo
          guiaAudio.play().catch(e => console.error("Error al reproducir audio:", e));
          
          document.querySelector('#info-btn').innerText = "Guía: Reproduciendo historia...";
          yaHablo = true;
        }
      });

      // Detectar cuando la imagen se pierde de vista
      targetEntity.addEventListener("targetLost", event => {
        console.log("Imagen perdida.");
        // Opcional: pausar el audio o esconder UI
      });

      // Función que usa IA local del dispositivo (Texto a Voz)
      function hablarIA(texto) {
        if ('speechSynthesis' in window) {
          const mensaje = new SpeechSynthesisUtterance();
          mensaje.text = texto;
          mensaje.lang = 'es-ES'; // Idioma español
          mensaje.rate = 0.9; // Velocidad de lectura
          mensaje.pitch = 1.2; // Tono (para darle personalidad)
          
          window.speechSynthesis.speak(mensaje);
        } else {
          console.warn("Lo siento, tu navegador no soporta sintetizador de voz.");
        }
      }
    </script>
  </body>
</html>
