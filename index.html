<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Museo Interactivo - Experiencia AR</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- A-Frame y MindAR -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
  <!-- Model Viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>

  <style>
    /* Estilos personalizados y configuraciones Base para que Tailwind funcione nativo */
    html, body {
      font-family: 'Inter', sans-serif;
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: transparent; /* Transparente para no tapar la cámara AR */
    }

    /* Efectos tipo "Glassmorphism" comunes en diseños modernos (como el portal de Tailwind) */
    .glass {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .glass-btn {
      background: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
    }
    .glass-btn:active {
      transform: scale(0.96);
    }

    /* Animación flotante suave */
    .animate-float { animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Ocultar el pre-loader feo que trae A-Frame por defecto */
    .a-loader-title {
      display: none !important;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      outline: none;
      --poster-color: transparent;
    }
  </style>

  <script>
    // Configuración de colores Tailwind para personalización exacta
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], },
          colors: { museogold: '#dfba70', }
        }
      }
    }
  </script>
</head>
<body class="text-slate-100">

  <!-- Audios de la aplicación -->
  <audio id="inicioAudio" src="./inicio.mp3" preload="auto"></audio>
  <audio id="guiaAudio" src="./traje.mp3" preload="auto"></audio>

  <!-- PANTALLA DE INICIO (Con diseño Tailwind Moderno) -->
  <div id="start-screen" class="absolute inset-0 z-[2000] flex items-center justify-center bg-slate-950/95 pointer-events-auto transition-opacity duration-700">
    <div class="glass max-w-sm rounded-[2rem] p-8 mx-4 text-center shadow-2xl shadow-cyan-900/10 border border-slate-700/50">
      
      <!-- Icono Central con Gradiente -->
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-cyan-500 to-blue-600 mx-auto flex items-center justify-center mb-6 shadow-lg shadow-cyan-500/30">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      </div>
      
      <h1 class="text-3xl font-bold text-white mb-3 tracking-tight">Descubre el Pasado</h1>
      <p class="text-slate-400 text-sm mb-8 leading-relaxed">Bienvenido a la experiencia inmersiva del museo. Escucha atentamente y encuentra las piezas clave.</p>
      
      <!-- Estado de Carga (Spinner) mientras AR arranca en fondo -->
      <div id="loading-state" class="flex flex-col items-center justify-center space-y-4 py-2">
        <div class="w-10 h-10 border-4 border-slate-700 border-t-cyan-500 rounded-full animate-spin"></div>
        <p class="text-[11px] text-cyan-400 font-semibold tracking-widest uppercase">Activando Cámara AR...</p>
      </div>

      <!-- Botón de Inicio (Oculto hasta que AR esté listo) -->
      <button id="start-btn" class="glass-btn hidden w-full py-4 px-6 rounded-2xl text-white font-semibold shadow-lg shadow-blue-500/25 flex items-center justify-center gap-2">
        Comenzar la experiencia
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
      </button>

    </div>
  </div>

  <!-- BANNER FLOTANTE (Centrado arriba, diseño tipo Toast) -->
  <div id="instruction-banner" class="hidden absolute top-8 left-1/2 -translate-x-1/2 z-[1500] pointer-events-none w-max max-w-[90vw]">
    <div class="glass px-5 py-3 rounded-full flex items-center gap-3 animate-float shadow-xl border border-slate-700/50">
      <div class="bg-cyan-500/20 p-1.5 rounded-full">
        <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <span class="font-medium text-sm text-slate-200 whitespace-nowrap">Busca una pieza en la sala...</span>
    </div>
  </div>

  <!-- CONTROLES AR (Ocultos hasta detectar la imagen) -->
  <div id="ui-container" class="hidden absolute bottom-12 inset-x-0 z-[500] flex-col items-center justify-end pointer-events-none px-6">
    
    <!-- Status Pill -->
    <div class="glass px-5 py-2.5 rounded-full mb-6 flex items-center gap-3 w-auto shadow-lg border border-slate-700/50">
      <span class="relative flex h-3 w-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-3 w-3 bg-cyan-500"></span>
      </span>
      <span class="text-[13px] font-medium text-slate-200">Guía: Reproduciendo historia...</span>
    </div>

    <!-- Explore Button -->
    <button id="explore-btn" class="glass-btn pointer-events-auto w-full max-w-xs py-4 rounded-full font-semibold shadow-2xl flex items-center justify-center gap-3 text-white">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
      Explorar Pieza 3D
    </button>
  </div>

  <!-- VISOR 3D (Se sobrepone sin cortar Audios) -->
  <div id="viewer-container" class="hidden absolute inset-0 z-[3000] bg-slate-950 flex-col">
    <!-- Navbar del Visor -->
    <div class="absolute top-0 inset-x-0 p-6 z-[3010] flex items-start justify-between pointer-events-none">
      <button id="back-btn" class="glass border border-slate-700 text-slate-200 pointer-events-auto px-5 py-3 rounded-2xl text-sm font-medium flex items-center gap-2 transition hover:bg-white/10 shadow-lg">
        <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Volver a la cámara
      </button>
    </div>
    
    <!-- Visualizador Interactivo -->
    <model-viewer src="./modelo.glb" 
                  camera-controls 
                  auto-rotate 
                  shadow-intensity="1" 
                  exposure="1">
    </model-viewer>
  </div>

  <!-- LA ESCENA DE REALIDAD AUMENTADA -->
  <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no; uiLoading: no;" 
           color-space="sRGB" 
           renderer="colorManagement: true, physicallyCorrectLights" 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: false"
           id="ar-scene">
           
    <a-assets>
      <a-asset-item id="piezaModel" src="./modelo.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- El modelo a escala 1 1 1 como pediste -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
      <a-gltf-model rotation="0 0 0" 
                    position="0 0 0" 
                    scale="1 1 1" 
                    src="#piezaModel" 
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 20000">
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <!-- LÓGICA DE INTERACCIÓN -->
  <script>
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const loadingState = document.getElementById('loading-state');
    const instructionBanner = document.getElementById('instruction-banner');
    const arScene = document.getElementById('ar-scene');
    
    const targetEntity = document.getElementById('target-entity');
    const uiContainer = document.getElementById('ui-container');
    const exploreBtn = document.getElementById('explore-btn');
    
    const viewerContainer = document.getElementById('viewer-container');
    const backBtn = document.getElementById('back-btn');

    const inicioAudio = document.getElementById('inicioAudio');
    const guiaAudio = document.getElementById('guiaAudio');

    let guiaActivado = false;

    // --- OPTIMIZACIÓN: ESPERAR A QUE LA CÁMARA AR ESTÉ LISTA ---
    // MindAR emite "arReady" cuando la cámara está activa y lista para trackear
    arScene.addEventListener("arReady", () => {
      // Ocultamos el spinner
      loadingState.classList.add('hidden');
      
      // Aseguramos que el botón aparezca fluido con display normal flex
      startBtn.classList.remove('hidden');
      startBtn.classList.add('flex');
    });

    // 1. Al presionar "Comenzar la experiencia"
    startBtn.addEventListener('click', () => {
      inicioAudio.play().catch(e => console.log('Error reproduciendo inicio:', e));

      // Fade out (desvanecer) la pantalla de inicio
      startScreen.style.opacity = '0';
      setTimeout(() => {
        startScreen.style.display = 'none';
        
        // Quitar la clase "hidden" del banner flotante temporalmente
        instructionBanner.classList.remove('hidden');
      }, 700);
    });

    // 2. Al detectar la imagen objetivo (`targets.mind`) en la cámara
    targetEntity.addEventListener("targetFound", () => {
      // Ocultar banner de búsqueda permanentemente
      instructionBanner.classList.add('hidden');
      
      // Mostrar botones de AR ("Explorar Pieza") usando flex
      uiContainer.classList.remove('hidden');
      uiContainer.classList.add('flex');

      // Reproducir historia solo si no se ha reproducido ya
      if (!guiaActivado) {
        guiaAudio.play().catch(e => console.log('Error reproduciendo historia:', e));
        guiaActivado = true;
      }
    });

    targetEntity.addEventListener("targetLost", () => {
      // Ocultar los botones si la cámara ya no ve la imagen
      uiContainer.classList.add('hidden');
      uiContainer.classList.remove('flex');
    });

    // 3. Al presionar "Explorar Pieza 3D" en modo AR
    exploreBtn.addEventListener('click', () => {
      // Mostrar visualizador 3D
      viewerContainer.classList.remove('hidden');
      viewerContainer.classList.add('flex');
    });

    // 4. Al presionar "Volver a la cámara" en el visor 3D
    backBtn.addEventListener('click', () => {
      viewerContainer.classList.add('hidden');
      viewerContainer.classList.remove('flex');
    });
  </script>
</body>
</html>
